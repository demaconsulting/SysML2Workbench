---
# ReviewMark Configuration File
#
# Files needing review
needs-review:
  - README.md
  - docs/user_guide/**/*.md
  - '**/*.cs'
  - requirements.yaml
  - docs/reqstream/**/*.yaml
  - docs/design/**/*.md
  - docs/sysml2/**/*.sysml
  - docs/verification/**/*.md
  - '!**/obj/**'
  - '!**/bin/**'
  - '!**/generated/**'
# Source of review evidence
evidence-source:
  type: none
# Context included for all reviews.
context:
  - docs/design/introduction.md
# Reviews
reviews:
  - id: Purpose
    title: Review that README and User Guide are Coherent and Complete
    context: ['!docs/design/introduction.md']
    paths: [README.md, docs/user_guide/**/*.md]
  - id: Decomposition
    title: Review that SysML2Workbench Decomposition Addresses the Stated Purpose
    context: [README.md, docs/user_guide/**/*.md]
    paths:
      - requirements.yaml
      - docs/design/introduction.md
      - docs/sysml2/**/*.sysml
  - id: SysML2Workbench-Architecture
    title: Review that SysML2Workbench Architecture Satisfies Requirements
    context: [README.md, docs/user_guide/**/*.md]
    paths:
      - docs/reqstream/sysml2-workbench.yaml
      - docs/design/introduction.md
      - docs/design/sysml2-workbench.md
      - docs/verification/introduction.md
      - docs/verification/sysml2-workbench.md
      - test/**/SysML2WorkbenchTests.cs
  - id: SysML2Workbench-Design
    title: Review that SysML2Workbench Design is Consistent and Complete
    context: [docs/reqstream/sysml2-workbench.yaml]
    paths:
      - docs/reqstream/sysml2-workbench/platform-requirements.yaml
      - docs/design/introduction.md
      - docs/design/sysml2-workbench.md
      - docs/design/sysml2-workbench/**/*.md
      - docs/design/ots.md
  - id: SysML2Workbench-Verification
