---
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (1.0.0)'
        required: true
        type: string
      publish:
        description: 'Publish type'
        required: true
        type: choice
        options:
          - none
          - release

jobs:
  # Calls the reusable build workflow to build, test, package, and generate
  # documentation for the release version.
  build:
    name: Build
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
    uses: ./.github/workflows/build.yaml
    with:
      version: ${{ inputs.version }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Cuts and publishes the release, creating a GitHub release with the cross-platform
  # zip archives, the Windows MSI installer, and the generated documents.
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download zip package artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: 'package-zip-*'
          merge-multiple: true

      - name: Download MSI package artifact
        uses: actions/download-artifact@v8
        with:
          name: package-msi
          path: artifacts

      - name: Download documents artifact
        uses: actions/download-artifact@v8
        with:
          name: documents
          path: artifacts

      - name: Create GitHub Release
        if: inputs.publish == 'release'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.version }}
          artifacts: artifacts/*
          bodyFile: artifacts/build_notes.md
          generateReleaseNotes: false
