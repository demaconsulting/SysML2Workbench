---
sections:
  - title: 'OTS Software Requirements'
    sections:
      - title: 'Avalonia Requirements'
        requirements:
          - id: 'Avalonia-HostDesktopShell'
            title: 'The SysML2Workbench shall use Avalonia to host its cross-platform desktop shell and user-interface controls.'
            justification: |
              Avalonia provides the cross-platform desktop UI surface required by the product's Windows, Linux, and macOS scope.
            tests:
              - 'AvaloniaTests.Startup_HostsDesktopShellControls'

          - id: 'Avalonia-HostInteractiveDiagramSurface'
            title: 'The SysML2Workbench shall use Avalonia to host the interactive SVG diagram surface and supporting workspace and diagnostics panels.'
            justification: |
              The workbench depends on Avalonia to compose the major UI regions around the rendered SVG viewer.
            tests:
              - 'AvaloniaTests.MainWindow_HostsDiagramAndDiagnosticsPanels'
