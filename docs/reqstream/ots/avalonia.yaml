---
sections:
  - title: 'OTS Software Requirements'
    sections:
      - title: 'Avalonia Requirements'
        requirements:
          - id: 'Avalonia-HostDesktopShell'
            title: 'The SysML2Workbench shall use Avalonia to host its cross-platform desktop shell and user-interface controls.'
            justification: |
              Avalonia provides the cross-platform desktop UI surface required by the product's Windows, Linux, and macOS scope.
            tests:
              - 'Startup_HostsDesktopShellControls'

          - id: 'Avalonia-HostInteractiveDiagramSurface'
            title: 'The SysML2Workbench shall use Avalonia to host the interactive SVG diagram surface and supporting workspace and diagnostics panels.'
            justification: |
              The workbench depends on Avalonia to compose the major UI regions around the rendered SVG viewer.
            tests:
              - 'MainWindow_HostsDiagramAndDiagnosticsPanels'

          - id: 'Avalonia-CopyDiagramAsSysmlViaContextMenu'
            title: 'The SysML2Workbench shall use Avalonia''s ContextMenu and TopLevel.Clipboard APIs to let a user right-click any open diagram tab and copy that diagram''s SysML view definition to the OS clipboard.'
            justification: |
              Every rendered diagram tab needs a discoverable, in-place way to copy its underlying SysML view text without navigating away to a separate panel or dialog, and Avalonia's real ContextMenu/Clipboard integration is the genuine end-to-end behavior being qualified rather than a mocked UI harness.
            tests:
              - 'DiagramContextMenu_CopyAsSysml_CopiesSnippetToClipboard'
