---
sections:
  - title: 'SysML2Workbench Requirements'
    sections:
      - title: 'LayoutRenderingSubsystem Requirements'
        sections:
          - title: 'SvgCanvasHost Requirements'
            requirements:
              - id: 'SysML2Workbench-LayoutRenderingSubsystem-SvgCanvasHost-DisplayRenderedSvg'
                title: 'The SvgCanvasHost shall display rendered SVG diagram output inside the application''s diagram canvas.'
                justification: |
                  The diagram viewer is the user-facing result of the layout and rendering pipeline.
                tests:
                  - 'LoadSvgDocument_DisplaysDiagramCanvas'

              - id: 'SysML2Workbench-LayoutRenderingSubsystem-SvgCanvasHost-SupportPanAndZoom'
                title: 'The SvgCanvasHost shall support pan and zoom interaction over the displayed diagram.'
                justification: |
                  Pan-and-zoom navigation is part of the defined Phase 0 scope for working with rendered diagrams.
                tests:
                  - 'UserInteraction_PansAndZoomsDiagram'

              - id: 'SysML2Workbench-LayoutRenderingSubsystem-SvgCanvasHost-ClearStaleDiagram'
                title: 'The SvgCanvasHost shall let a caller discard the currently displayed diagram and reset
                  zoom and pan to their defaults, so a stale, previously-rendered diagram is never left on screen
                  once it no longer corresponds to the current configuration.'
                justification: |
                  Callers whose current configuration becomes invalid after a successful render (for example an
                  edited custom-view definition) need a way to blank the canvas rather than leave a misleading,
                  outdated diagram visible.
                tests:
                  - 'Clear_ContentLoaded_DiscardsSvgAndResetsViewport'
