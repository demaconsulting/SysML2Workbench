---
sections:
  - title: 'SysML2Workbench Requirements'
    sections:
      - title: 'AppShellSubsystem Requirements'
        sections:
          - title: 'MainWindowShell Requirements'
            requirements:
              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-ArrangePrimaryRegions'
                title: 'The MainWindowShell shall arrange the primary workspace, view selection, diagram, custom-view, and diagnostics regions within the desktop window.'
                justification: |
                  The shell unit is responsible for turning the subsystem's capabilities into a usable desktop layout.
                tests:
                  - 'Startup_ArrangesPrimaryWorkspaceAndDiagramRegions'

              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-ManageViewTabs'
                title: 'The MainWindowShell shall manage tabbed view presentation for rendered diagrams during a user session.'
                justification: |
                  The architecture calls out tabbed views as part of the desktop shell experience, including multiple independent diagram tabs, predefined-view tab duplicate-avoidance/focus, custom-view-preview in-place-update-or-new-tab semantics, and tab close/active-tab reassignment.
                tests:
                  - 'OpenViews_ManagesTabbedPresentation'
                  - 'PreviewCustomView_WhenActiveTabIsCustomPreview_UpdatesInPlace'
                  - 'PreviewCustomView_WhenActiveTabIsPredefinedView_OpensNewTab'
                  - 'PreviewCustomView_WithNoTabsOpen_OpensNewTab'
                  - 'OpenNewCustomPreviewTab_OpensEmptyActiveTab_AndSubsequentPreviewUpdatesIt'
                  - 'CloseDiagramTab_RemovesTab_AndReassignsActiveTab'
                  - 'NotifyActiveDiagramTab_UnknownId_IsIgnored'
                  - 'SelectPredefinedView_TabsHaveIndependentCanvases'

              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-SynchronizeSessionState'
                title: 'The MainWindowShell shall synchronize active workspace, view selection, custom-view state, and diagnostics across the visible shell regions.'
                justification: |
                  Users need shell regions to stay in sync as they browse the workspace and interact with rendered or custom views.
                tests:
                  - 'SessionStateChanges_SynchronizeVisibleRegions'
