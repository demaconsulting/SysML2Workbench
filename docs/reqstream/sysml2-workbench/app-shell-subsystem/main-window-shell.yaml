---
sections:
  - title: 'SysML2Workbench Requirements'
    sections:
      - title: 'AppShellSubsystem Requirements'
        sections:
          - title: 'MainWindowShell Requirements'
            requirements:
              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-ArrangePrimaryRegions'
                title: 'The MainWindowShell shall arrange the primary workspace, view selection, diagram, custom-view, and diagnostics regions within the desktop window.'
                justification: |
                  The shell unit is responsible for turning the subsystem's capabilities into a usable desktop layout.
                tests:
                  - 'Startup_ArrangesPrimaryWorkspaceAndDiagramRegions'

              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-ManageViewTabs'
                title: 'The MainWindowShell shall manage tabbed view presentation for rendered diagrams during a user session.'
                justification: |
                  The architecture calls out tabbed views as part of the desktop shell experience, including multiple independent diagram tabs, predefined-view tab duplicate-avoidance/focus, custom-view-preview in-place-update-or-new-tab semantics, and tab close/active-tab reassignment.
                tests:
                  - 'OpenViews_ManagesTabbedPresentation'
                  - 'PreviewCustomView_WhenActiveTabIsCustomPreview_UpdatesInPlace'
                  - 'PreviewCustomView_WhenActiveTabIsPredefinedView_OpensNewTab'
                  - 'PreviewCustomView_WithNoTabsOpen_OpensNewTab'
                  - 'OpenNewCustomPreviewTab_OpensEmptyActiveTab_AndSubsequentPreviewUpdatesIt'
                  - 'CloseDiagramTab_RemovesTab_AndReassignsActiveTab'
                  - 'NotifyActiveDiagramTab_UnknownId_IsIgnored'
                  - 'SelectPredefinedView_TabsHaveIndependentCanvases'

              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-SynchronizeSessionState'
                title: 'The MainWindowShell shall synchronize active workspace, view selection, custom-view state, and diagnostics across the visible shell regions.'
                justification: |
                  Users need shell regions to stay in sync as they browse the workspace and interact with rendered or custom views.
                tests:
                  - 'SessionStateChanges_SynchronizeVisibleRegions'

              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-ManageMultipleSources'
                title: 'The MainWindowShell shall support adding and removing individual file and folder workspace sources, additively watching and unwatching each source, and raising SourcesChanged whenever the source set changes.'
                justification: |
                  Users build up a workspace from an arbitrary combination of files and folders rather than a single root folder, and every panel needs a reliable notification to stay synchronized as sources come and go.
                tests:
                  - 'AddFolderSourceAsync_SecondDistinctFolder_IsAdditiveAndWatchesBothSources'
                  - 'SourcesChanged_RaisedOnAdd_NotRaisedAtConstruction'

              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-SupportEmptyWorkspace'
                title: 'The MainWindowShell shall start with a valid, non-null empty workspace snapshot at construction, and shall correctly return to that empty state - clearing every open tab - when the last remaining source is removed.'
                justification: |
                  Zero sources open is a first-class, valid application state rather than an error, both before the user has opened anything and after removing everything they had opened.
                tests:
                  - 'Construction_EstablishesValidEmptySnapshot'
                  - 'RemoveSourceAsync_DownToZeroSources_ProducesEmptySnapshotAndUnwatchesEverything'
                  - 'SelectPredefinedView_NoWorkspaceOpened_ThrowsInvalidOperationException'

              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-ExportTabAsSysml'
                title: 'The MainWindowShell shall derive and export a SysML view snippet for any open diagram tab whose originating view definition can be determined, and shall report that a tab has no derivable definition rather than throwing.'
                justification: |
                  Every diagram tab - predefined view or custom-view-builder preview - supports a "Copy as SysML" context-menu action that reuses the existing SysmlSnippetGenerator, and a tab whose definition cannot be derived (for example an unscoped predefined view with zero expose members, or an unrendered custom-preview tab) must disable that action gracefully instead of crashing.
                tests:
                  - 'ExportTabAsSysmlSnippet_PredefinedViewTab_ReturnsSnippet'
                  - 'ExportTabAsSysmlSnippet_CustomPreviewTab_ReturnsSnippet'
                  - 'ExportTabAsSysmlSnippet_UnknownTabId_ReturnsNull'
                  - 'ExportTabAsSysmlSnippet_PredefinedViewWithNoExposeMembers_ReturnsNull'
                  - 'CanExportTabAsSysml_MirrorsExportability'

              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-RenderCustomViewPreviewWithoutMutatingTabs'
                title: 'The MainWindowShell shall render a live custom-view preview without mutating OpenTabs, ActiveTabId, or ActiveCustomView, so a dialog can preview in-progress edits without leaking a real tab into the shell before the user commits.'
                justification: |
                  ViewBuilderDialog's left-hand live preview pane must re-render on every in-progress edit while the dialog is open; using the existing PreviewCustomView for this would mutate the shell's real open-tab list on every keystroke, violating Cancel's "zero side effects" contract.
                tests:
                  - 'RenderCustomViewPreview_DoesNotMutateOpenTabsOrActiveTab'
                  - 'RenderCustomViewPreview_NoWorkspaceOpened_ThrowsInvalidOperationException'

              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-CloseAllSources'
                title: 'The MainWindowShell shall close every workspace source at once, returning to the same valid empty state used at construction, and raise SourcesChanged.'
                justification: |
                  The File menu's "Close All" command lets a user reset the entire workspace in one action rather than removing every source individually, and must reach exactly the same fresh-launch empty state (no tabs, no diagnostics, no watched sources) as removing sources one at a time.
                tests:
                  - 'CloseAllSourcesAsync_WithMultipleSources_ProducesEmptySnapshotAndUnwatchesEverything'

              - id: 'SysML2Workbench-AppShellSubsystem-MainWindowShell-OpenSourceTextTab'
                title: 'The MainWindowShell shall open a read-only source-text tab for a given file path, reusing an already-open tab for the same path instead of duplicating it, and shall resolve an open source-text tab''s file path on request.'
                justification: |
                  Double-clicking a .sysml file in the workspace tree must open its raw text in its own tab without duplicating tabs on repeated double-clicks, and the resulting view model needs a way to resolve which file it displays without MainWindowShell exposing OpenTabs internals further.
                tests:
                  - 'OpenSourceTextTab_NewFile_CreatesOneNewActiveTab'
                  - 'OpenSourceTextTab_SamePathTwice_RefocusesExistingTabWithoutDuplicating'
                  - 'GetTabFilePath_ReturnsPathForSourceTextTab_AndNullOtherwise'
