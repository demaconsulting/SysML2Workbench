---
sections:
  - title: 'SysML2Workbench Requirements'
    sections:
      - title: 'ViewBuilderSubsystem Requirements'
        sections:
          - title: 'ViewDefinitionModel Requirements'
            requirements:
              - id: 'SysML2Workbench-ViewBuilderSubsystem-ViewDefinitionModel-StoreSelectedViewKind'
                title: 'The ViewDefinitionModel shall store the currently selected custom view kind for the active session.'
                justification: |
                  The GUI builder needs a single source of truth for which type of diagram the user is constructing.
                tests:
                  - 'ChangeViewKind_StoresCurrentSelection'

              - id: 'SysML2Workbench-ViewBuilderSubsystem-ViewDefinitionModel-StoreExposeTargets'
                title: 'The ViewDefinitionModel shall store one or more selected expose targets for the custom view definition.'
                justification: |
                  The architecture explicitly supports multi-target expose semantics, so the unit must preserve multiple selected targets.
                tests:
                  - 'AddExposeTarget_StoresMultipleExposeTargetsWithoutDuplicates'
                  - 'RemoveExposeTarget_RemovesOnlyMatchingSelection'
                  - 'RemoveExposeTarget_UnknownQualifiedName_IsNoOp'
                  - 'RemoveExposeTarget_KnownQualifiedNameWrongRecursionKind_IsNoOp'
                  - 'AddExposeTarget_ExactQualifiedNameAndKindTwice_IsNoOp'
                  - 'AddExposeTarget_SameQualifiedNameDifferentRecursionKind_AddsBothSelections'
                  - 'RemoveExposeTarget_OneOfTwoSameQualifiedNameSelections_LeavesOtherUntouched'

              - id: 'SysML2Workbench-ViewBuilderSubsystem-ViewDefinitionModel-StoreExposeRecursionAndFilter'
                title: 'The ViewDefinitionModel shall store an optional recursion kind and bracket-filter expression per expose target and reject bracket filters on non-recursive kinds.'
                justification: |
                  SysML2Tools 0.1.0-beta.8 exposes four distinct expose recursion kinds and an optional bracket-filter
                  expression on the two recursive kinds; the builder must let users select a kind and filter per target and
                  must flag combinations that are not valid SysML v2 syntax.
                tests:
                  - 'SetExposeRecursionKind_ChangesSelectedTargetKind'
                  - 'SetExposeRecursionKind_OneOfTwoSameQualifiedNameSelections_DoesNotAffectOther'
                  - 'SetExposeRecursionKind_TargetKindAlreadyTakenBySibling_IsNoOp'
                  - 'SetExposeBracketFilter_SetsAndClearsExpression'
                  - 'ValidateAgainstWorkspace_ValidBracketFilterOnRecursiveTarget_ReturnsNoDiagnostics'
                  - 'ValidateAgainstWorkspace_InvalidBracketFilterExpression_ReturnsDiagnostic'
                  - 'ValidateAgainstWorkspace_BracketFilterOnNonRecursiveKind_ReturnsDiagnostic'

              - id: 'SysML2Workbench-ViewBuilderSubsystem-ViewDefinitionModel-ReportDefinitionReadiness'
                title: 'The ViewDefinitionModel shall report whether the current custom view definition contains enough information to render or export.'
                justification: |
                  The shell and snippet generator need to know when a user's current selections form a usable custom view definition.
                tests:
                  - 'DefinitionState_ReportsRenderAndExportReadiness'

              - id: 'SysML2Workbench-ViewBuilderSubsystem-ViewDefinitionModel-AddExposeTargetSelectionDirectly'
                title: 'The ViewDefinitionModel shall accept a fully-specified ExposeTargetSelection (qualified name, recursion kind, and optional bracket-filter expression) in a single call, deduplicated by the exact (qualified name, recursion kind) pair.'
                justification: |
                  Reconstructing an arbitrary real expose member - any of the four recursion kinds plus an optional bracket filter - from a workspace's predefined view requires a single-call add that does not risk colliding with an already-present sibling selection, unlike the string overload's fixed default recursion kind plus a separate retarget/filter call sequence.
                tests:
                  - 'AddExposeTarget_SelectionOverload_AppendsAndDedupesByQualifiedNameAndRecursionKind'
                  - 'AddExposeTarget_SelectionOverload_NullSelection_ThrowsArgumentNullException'
