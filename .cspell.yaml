---
# Spell-Checking
#
# PURPOSE:
# - Maintain professional documentation and code quality
# - Catch spelling errors before publication
# - Support consistent technical terminology usage
# - NEVER add a misspelled word - fix the typo in the source instead
# - NEVER add a British-English spelling - correct to US-English in the source
# - PROPOSE only genuine technical terms/names as needed
version: '0.2'
language: en
words:
  - axaml
  - bursty
  - buildmark
  - Dema
  - fileassert
  - Hmmssfff
  - LOCALAPPDATA
  - Pandoc
  - pasteable
  - postconditions
  - renderable
  - reparsed
  - reparses
  - reqstream
  - reviewmark
  - sarif
  - sarifmark
  - Skia
  - slnx
  - sonar
  - sonarmark
  - Stdlib
  - sysml
  - timeslice
  - versionmark
  - Weasyprint
  - xunit
  - Xunit
  - yamlfix
  - Avalonia
  - DemaConsulting
  - SysML2
  - SysML2Tools
  - SysML2Workbench
ignorePaths:
  - '**/.git/**'
  - '**/node_modules/**'
  - '**/.venv/**'
  - '**/thirdparty/**'
  - '**/third-party/**'
  - '**/3rd-party/**'
  - '**/.agent-logs/**'
  - '**/bin/**'
  - '**/obj/**'
  - '**/generated/**'
  - package-lock.json
